name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - name: Typecheck
        run: yarn typecheck
      - name: Build editor package
        run: yarn workspace @kalamoss/editor run build
      - name: Build server
        run: yarn workspace server run build
      - name: Build demo
        run: yarn workspace demo run build
      - name: Test editor package
        run: yarn workspace @kalamoss/editor run test
      - name: Test server (sqlite)
        run: yarn workspace server run test
        env:
          DB_DIALECT: sqlite
          SQLITE_STORAGE: ":memory:"
