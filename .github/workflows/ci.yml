name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - name: Typecheck
        run: yarn typecheck
      - name: Build editor package
        run: yarn workspace @kalamos/editor run build
      - name: Build server
        run: yarn workspace server run build
      - name: Build demo
        run: yarn workspace demo run build
      - name: Test editor package
        run: yarn workspace @kalamos/editor run test
      - name: Test server (sqlite)
        run: yarn workspace server run test
        env:
          DB_DIALECT: sqlite
          SQLITE_STORAGE: ":memory:"

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: block_editor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/block_editor
      PUBLIC_BASE_URL: http://localhost:4000
      CORS_ORIGIN: "*"
      VITE_API_BASE: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - name: Build editor + demo
        run: |
          yarn workspace @kalamos/editor run build
          yarn workspace demo run build
      - name: Install Playwright browsers
        run: yarn workspace demo exec playwright install --with-deps chromium
      - name: Start server
        run: |
          yarn workspace server run build
          (cd apps/server && node dist/index.js &) 
          npx wait-on http://localhost:4000/health
      - name: Seed sample document
        run: yarn workspace server run db:seed
      - name: Run e2e
        run: yarn workspace demo run test:e2e
